<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>경복궁 벚꽃 상세정보</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Noto Sans KR", "Noto Sans Korean", sans-serif; background: #fff2f9; color: #5e2e49; padding: 24px 14px; }
    .container { width: min(860px, 96vw); margin: 0 auto; background: #fff; border: 1px solid rgba(220,104,161,.32); border-radius: 18px; overflow: hidden; }
    img { width: 100%; height: min(44vh, 360px); object-fit: cover; display: block; }
    .video-link-wrap { display: flex; justify-content: center; padding: 12px 0 2px; }
    .video-link { width: 46px; height: 46px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; background: #ff0000; color: #fff; box-shadow: 0 8px 14px rgba(170, 35, 35, 0.25); border: 2px solid #fff4fa; }
    .video-link svg { width: 21px; height: 21px; fill: currentColor; }
    .info { padding: 20px; }
    h1 { margin: 0 0 14px; color: #a93970; }
    .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .detail-item { border: 1px solid rgba(220,104,161,.28); border-radius: 12px; padding: 10px 12px; background: #fff8fc; }
    .detail-item h2 { margin: 0 0 6px; font-size: 0.95rem; color: #9a3d67; }
    .detail-item p { margin: 0; line-height: 1.6; font-size: 0.93rem; }
    .full { grid-column: 1 / -1; }
    .back-link { margin-top: 16px; display: inline-block; color: #7c3559; text-decoration: none; }
    @media (max-width: 640px) { .detail-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="container">
    <img src="assets/경복궁.jpg" alt="경복궁 벚꽃 사진" />
    <div class="video-link-wrap">
      <a class="video-link" href="https://www.youtube.com/shorts/QAEahytXVzI" target="_blank" rel="noopener noreferrer" aria-label="경복궁 유튜브 영상 보기">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M23.5 7.2a3.01 3.01 0 0 0-2.1-2.1C19.5 4.6 12 4.6 12 4.6s-7.5 0-9.4.5A3.01 3.01 0 0 0 .5 7.2 31.7 31.7 0 0 0 0 12a31.7 31.7 0 0 0 .5 4.8 3.01 3.01 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3.01 3.01 0 0 0 2.1-2.1A31.7 31.7 0 0 0 24 12a31.7 31.7 0 0 0-.5-4.8zM9.6 15.2V8.8l6.2 3.2-6.2 3.2z"/></svg>
      </a>
    </div>
    <section class="info">
      <h1>경복궁 벚꽃 명소 상세정보</h1>
      <div class="detail-grid">
        <article class="detail-item"><h2>기간</h2><p>2026년 3월 27일 ~ 4월 16일 (예상)</p></article>
        <article class="detail-item"><h2>장소</h2><p>경복궁 경내 및 국립민속박물관 주변 일대</p></article>
        <article class="detail-item"><h2>주요 행사</h2><p>궁궐 야간관람, 전통문화 체험 프로그램, 고궁 해설 투어</p></article>
        <article class="detail-item"><h2>벚꽃 특징</h2><p>근정전, 향원정 주변에서 고궁 지붕선과 벚꽃 가지가 함께 어우러짐.</p></article>
        <article class="detail-item full"><h2>팁</h2><p>주말 혼잡도가 높아 오전 입장 권장. 궁궐 내부는 보행 구간이 길어 편한 신발 착용이 좋습니다.</p></article>
      </div>
      <a class="back-link" href="index.html" onclick="if (window.history.length > 1) { window.history.back(); return false; }">뒤로가기</a>
    </section>
  </main>
</body>
</html>
